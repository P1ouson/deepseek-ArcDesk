name: ci

on:
  push:
    branches: [main, main-v2, ui-redesign]
  pull_request:
    branches: [main, main-v2, ui-redesign]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            desktop/go.sum

      - name: Toolchain pin
        run: node scripts/check-go-toolchain.mjs

      - name: Vet
        run: go vet ./...

      - name: Test CLI module
        run: go test ./...

      - name: Test desktop module
        working-directory: desktop
        run: go test ./...
