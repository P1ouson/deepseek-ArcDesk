<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ARCDESK 手机连接</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111214;
      --panel: #1a1c20;
      --border: #2a2e36;
      --fg: #f3f4f6;
      --muted: #9aa3b2;
      --accent: #e07a3a;
      --accent-soft: rgba(224, 122, 58, 0.16);
      --incoming: #23262d;
      --outgoing: rgba(224, 122, 58, 0.18);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--fg); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { display: flex; flex-direction: column; min-height: 100%; }
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      position: sticky; top: 0; z-index: 2;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header p { font-size: 12px; color: var(--muted); margin-top: 4px; }
    #status { font-size: 12px; color: var(--muted); margin-top: 6px; }
    #status.ok { color: #6fcf97; }
    #status.err { color: #ff8b8b; }
    #log {
      flex: 1 1 auto;
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bubble {
      max-width: 88%;
      padding: 11px 13px;
      border-radius: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }
    .bubble.in { align-self: flex-start; background: var(--incoming); }
    .bubble.out { align-self: flex-end; background: var(--outgoing); color: #ffd8bf; }
    .bubble.pending { opacity: 0.7; font-style: italic; }
    .empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 24px;
    }
    footer {
      border-top: 1px solid var(--border);
      background: var(--panel);
      padding: 10px 12px calc(10px + var(--safe-bottom));
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    textarea {
      width: 100%;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--fg);
      padding: 10px 12px;
      min-height: 42px;
      max-height: 120px;
      font: inherit;
    }
    button {
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      padding: 11px 16px;
      min-width: 64px;
    }
    button:disabled { opacity: 0.45; }
  </style>
</head>
<body>
  <header>
    <h1>ARCDESK</h1>
    <p id="subtitle">手机远程连接</p>
    <div id="status">正在连接电脑…</div>
  </header>
  <main id="log"><div class="empty" id="placeholder">配对成功后，可在这里查看 Agent 回复并继续发指令。</div></main>
  <footer>
    <textarea id="input" rows="1" placeholder="发消息给电脑上的 Agent…" disabled></textarea>
    <button id="send" type="button" disabled>发送</button>
  </footer>
  <script>
    const token = {{PAIR_TOKEN}};
    const storageKey = "ARCDESK-mobile-session";
    let sessionId = localStorage.getItem(storageKey) || "";
    let pollTimer = null;
    let sending = false;
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const placeholder = document.getElementById("placeholder");

    function setStatus(text, kind) {
      statusEl.textContent = text;
      statusEl.className = kind || "";
    }

    function renderMessages(items) {
      if (!items.length) return;
      placeholder?.remove();
      logEl.innerHTML = "";
      for (const item of items) {
        const el = document.createElement("article");
        const side = item.outgoing ? "out" : "in";
        el.className = "bubble " + side + (item.status === "pending" ? " pending" : "");
        el.textContent = item.text;
        logEl.appendChild(el);
      }
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function api(path, body) {
      const res = await fetch(path, {
        method: body ? "POST" : "GET",
        headers: body ? { "Content-Type": "application/json" } : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
      return data;
    }

    async function pair() {
      const data = await api("/mobile/api/pair", { token });
      sessionId = data.sessionId;
      localStorage.setItem(storageKey, sessionId);
      setStatus("已连接到此电脑", "ok");
      inputEl.disabled = false;
      sendBtn.disabled = false;
      await refreshMessages();
      if (!pollTimer) pollTimer = setInterval(refreshMessages, 1500);
    }

    async function refreshMessages() {
      if (!sessionId) return;
      try {
        const data = await api("/mobile/api/messages?session=" + encodeURIComponent(sessionId));
        renderMessages(data.messages || []);
      } catch (err) {
        setStatus(String(err.message || err), "err");
      }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !sessionId || sending) return;
      sending = true;
      sendBtn.disabled = true;
      try {
        await api("/mobile/api/send", { sessionId, text });
        inputEl.value = "";
        await refreshMessages();
      } catch (err) {
        setStatus(String(err.message || err), "err");
      } finally {
        sending = false;
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    (async () => {
      try {
        if (sessionId) {
          await refreshMessages();
          setStatus("已连接到此电脑", "ok");
          inputEl.disabled = false;
          sendBtn.disabled = false;
          pollTimer = setInterval(refreshMessages, 1500);
          return;
        }
        await pair();
      } catch (err) {
        setStatus("配对失败：" + (err.message || err), "err");
      }
    })();
  </script>
</body>
</html>
