version: 2
project_name: ARCDESK

before:
  hooks:
    - go mod download

builds:
  - id: ARCDESK
    main: ./cmd/ARCDESK
    binary: ARCDESK
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: ARCDESK
    ids: [ARCDESK]
    name_template: "ARCDESK-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

homebrew_casks:
  - name: ARCDESK
    ids: [ARCDESK]
    # Prereleases (v*-rc*) must not update the stable tap; brew has no separate
    # prerelease channel, so a pushed rc cask becomes the default `brew install`.
    skip_upload: "auto"
    repository:
      owner: esengine
      name: homebrew-ARCDESK
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/P1ouson/deepseek-ArcDesk"
    description: "Cache-first DeepSeek coding agent for the terminal."
    commit_author:
      name: ARCDESK
      email: ARCDESK@deepseek.com
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ARCDESK"]
          end

release:
  prerelease: auto
  name_template: "ARCDESK CLI {{ .Tag }}"
